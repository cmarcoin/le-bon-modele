services:
  db:
    image: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && foreman start -f Procfile.dev"
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "3001:3000"
    environment:
      RAILS_ENV: development
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    depends_on:
      - db
    networks:
      - default

networks:
  default:

volumes:
  postgres_data:
