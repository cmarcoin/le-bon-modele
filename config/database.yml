default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: <%= ENV["DATABASE_HOST"] %>
  port: <%= ENV["DATABASE_PORT"] %>
  username: <%= ENV["DATABASE_USERNAME"] %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  database: <%= ENV["DATABASE_NAME"] %>_development

test:
  <<: *default
  host: <%= ENV["DATABASE_HOST"] %>
  port: <%= ENV["DATABASE_PORT"] %>
  username: <%= ENV["DATABASE_USERNAME"] %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  database: <%= ENV["DATABASE_NAME"] %>_test

# Scalingo: use DATABASE_URL for production DBs (primary + queue).
# https://doc.scalingo.com/languages/ruby/rails/solid-queue
#
# Solid Cache / Solid Cable are disabled (see Gemfile). To restore, uncomment cache and cable below,
# re-enable the gems, and run `bin/rails db:prepare`.
production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  queue:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate
    # Solid Queue needs one connection per worker thread plus 2 (polling + heartbeat).
    pool: <%= ENV.fetch("SOLID_QUEUE_THREADS", 3).to_i + 2 %>

  # cache:
  #   <<: *primary_production
  #   url: <%= ENV["DATABASE_URL"] %>
  #   migrations_paths: db/cache_migrate

