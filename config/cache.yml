default: &default
  store_options:
    # Cap age of oldest cache entry to fulfill retention policies
    # max_age: <%= 60.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= Rails.env %>

development:
  <<: *default

test:
  <<: *default

# Solid Cache only. Uncomment when re-enabling Solid Cache (see Gemfile, database.yml).
# production:
#   database: cache
#   <<: *default
